name: Aravind Kumar, DonOfDen
markdown: kramdown
permalink: /blog/:year/:month/:day/:title
style: light

colors:
  Python: "#3572A5"
  Go: "#00ADD8"
  Makefile: "#427819"
  HTML: "#e34c26"
  CSS: "#563d7c"
  JavaScript: "#f1e05a"
  Shell: "#89e051"

defaults:
  values:
    layout: null

projects:
  sort_by: pushed
  # sort_by options:
  #   - pushed
  #   - stars
  exclude:
    archived: false
    forks: true
    projects:
    # - repo-name
  # Allowlist: only repos listed here will be shown in the Projects section.
  # Leave empty (comment out all entries) to show all non-excluded repos.
  show:
    - donofden.github.io
    - python-boto3-examples
    - go-lang-cheat-sheet
    - cachetools-python
    - scrum-master-automation
    - github-automation-bot
plugins:
  - jekyll-github-metadata
  - jemoji
  - jekyll-sitemap