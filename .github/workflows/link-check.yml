name: Broken Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch externally broken links
    - cron: "0 8 * * 1"

jobs:
  link-check:
    name: Check for broken links
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2
        with:
          # Check all markdown posts and HTML pages
          args: >-
            --verbose
            --no-progress
            --timeout 20
            --max-retries 3
            --exclude "linkedin\.com"
            --exclude "twitter\.com"
            --exclude "facebook\.com"
            --exclude "stackoverflow\.com"
            --exclude "localhost"
            --exclude "127\.0\.0\.1"
            --exclude "maps\.googleapis\.com"
            './_posts/**/*.md'
            './*.html'
            './blog/*.html'
          fail: true
